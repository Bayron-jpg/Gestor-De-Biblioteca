spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      server:
        webmvc:
          routes:
            # Grupo 1 — Gestión de Libros
            - id: autor_service
              uri: lb://autor-service
              predicates:
                - Path=/api/v1/autores/**

            - id: genero_service
              uri: lb://genero-service
              predicates:
                - Path=/api/v1/generos/**

            - id: libro_service
              uri: lb://libro-service
              predicates:
                - Path=/api/v1/libros/**

            # Grupo 2 — Gestión de Personal
            - id: bibliotecario_service
              uri: lb://bibliotecario-service
              predicates:
                - Path=/api/v1/bibliotecarios/**

            - id: turno_service
              uri: lb://turno-service
              predicates:
                - Path=/api/v1/turnos/**

            # Grupo 3 — Gestión de Usuarios
            - id: telefono_service
              uri: lb://telefono-service
              predicates:
                - Path=/api/v1/telefonos/**

            - id: direccion_service
              uri: lb://direccion-service
              predicates:
                - Path=/api/v1/direcciones/**

            - id: usuario_service
              uri: lb://usuario-service
              predicates:
                - Path=/api/v1/usuarios/**

            # Grupo 4 — Gestión de Instalaciones
            - id: piso_service
              uri: lb://piso-service
              predicates:
                - Path=/api/v1/pisos/**

            - id: sala_service
              uri: lb://sala-service
              predicates:
                - Path=/api/v1/salas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080