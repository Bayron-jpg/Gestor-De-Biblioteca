  # --- 3 API Gateway ---

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      eureka:
        condition: service_started
      autor-service:
        condition: service_started
      bibliotecario-service:
        condition: service_started
      turno-service:
        condition: service_started
      genero-service:
        condition: service_started
      libro-service:
        condition: service_started
      telefono-service:
        condition: service_started
      direccion-service:
        condition: service_started
      usuario-service:
        condition: service_started
      piso-service:
        condition: service_started
      sala-service:
        condition: service_started
    networks:
