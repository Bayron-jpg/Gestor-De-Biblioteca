version: '3.8'

services:
  # --- 1 Infraestructura ---
  
  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca_db
    ports:
      - "3306:3306"
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  eureka:
    build: ./eureka
    ports:
      - "8761:8761"
    networks:
      - biblioteca-net

  # --- 2 Microservicios ---

  autor-service:
    build: ./autor-service
    ports:
      - "8081:8081"
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/db_autores_dev?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    networks:
      - biblioteca-net

  bibliotecario-service:
    build: ./bibliotecario-service
    ports:
      - "8084:8084"
